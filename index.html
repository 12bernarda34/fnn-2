<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JsPsych Video Experiment</title>
    <link href="jspsych/jspsych.css" rel="stylesheet" type="text/css" />
    <script src="jspsych/jspsych.js"></script>
    <script src="jspsych/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/plugin-html-button-response.js"></script>
    <script src="jspsych/plugin-preload.js"></script>
    <script src="jspsych/plugin-webgazer-init-camera.js"></script>
    <script src="jspsych/plugin-webgazer-calibrate.js"></script>
    <script src="jspsych/plugin-webgazer-validate.js"></script>
    <script src="jspsych/webgazer.js"></script>
    <script src="jspsych/extension-webgazer.js"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <style>
      .jspsych-btn {
        margin-bottom: 10px;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .fixation-star {
        width: 100px;
        height: 100px;
        animation: spin 1.5s linear infinite;
      }

      @keyframes spin-pinwheel {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
      }

      .lab-footer {
        color: grey;
        font-size: 14px;
        margin-top: 30px;
      }
    </style>
  </head>
  <body></body>
  <script>
    const jsPsych = initJsPsych({
      extensions: [
        { type: jsPsychExtensionWebgazer }
      ]
    });

    const videoFiles = [
      'vid/introduction.mp4',
      'vid/bee_positive.mp4',
      'vid/bee_negation.mp4',
      'vid/bee_maybe.mp4',
      'vid/bee_gleebly.mp4'
    ];

    const labFooter = '<p class="lab-footer">NYU Child Language Lab</p>';

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let dingBuffer = null;
    fetch('snd/ding.mp3')
      .then((res) => res.arrayBuffer())
      .then((data) => audioCtx.decodeAudioData(data))
      .then((buffer) => { dingBuffer = buffer; })
      .catch(() => {});

    function playDing() {
      if (!dingBuffer) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const source = audioCtx.createBufferSource();
      source.buffer = dingBuffer;
      source.connect(audioCtx.destination);
      source.start(0);
    }

    const preload = {
      type: jsPsychPreload,
      video: videoFiles,
      images: ['img/star.png', 'img/pinwheel.png'],
      audio: ['snd/ding.mp3', 'snd/sparkle.mp3']
    };

    const welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<p>Welcome to the experiment! Press any key to begin.</p>' + labFooter
    };

    const cameraInstructions = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <p>In order to participate you must allow the experiment to use your camera for eye tracking.</p>
        <p>You will be prompted to do this on the next screen.</p>
        <p>If you do not wish to allow use of your camera, you cannot participate in this experiment.</p>
        <p>It may take up to 30 seconds for the camera to initialize after you give permission. Please make sure your face is clearly visible and well lit.</p>
      ` + labFooter,
      choices: ['Got it']
    };

    const initCamera = {
      type: jsPsychWebgazerInitCamera
    };

    const calibrationInstructions = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <p>Now you'll calibrate the eye tracker, so the software can use the image of your eyes to predict where you're looking.</p>
        <p>A series of images will appear on the screen. Look at each image and click on it.</p>
      ` + labFooter,
      choices: ['Got it']
    };

    const calibrationImage = 'img/pinwheel.png';

    const calibrationTargets = [
      { x: 25, y: 25 },
      { x: 75, y: 25 },
      { x: 50, y: 50 },
      { x: 25, y: 75 },
      { x: 75, y: 75 }
    ];

    function makeCalibrationPoint(x, y) {
      return {
        type: jsPsychHtmlButtonResponse,
        stimulus: '',
        choices: [''],
        on_load: function () {
          const btn = document.querySelector('.jspsych-btn');
          btn.style.position = 'absolute';
          btn.style.left = x + '%';
          btn.style.top = y + '%';
          btn.style.width = '170px';
          btn.style.height = '170px';
          btn.style.background = `url('${calibrationImage}') no-repeat center / 110px 110px`;
          btn.style.border = 'none';
          btn.style.padding = '0';
          btn.style.cursor = 'pointer';
          btn.style.animation = 'spin-pinwheel 2s linear infinite';
          btn.style.zIndex = '2147483647';
        },
        on_finish: function () {
          playDing();
          const px = Math.round((x / 100) * window.innerWidth);
          const py = Math.round((y / 100) * window.innerHeight);
          jsPsych.extensions.webgazer.calibratePoint(px, py);
        }
      };
    }

    function shuffleNoAdjacentRepeats(points) {
      let shuffled = points;
      for (let attempt = 0; attempt < 100; attempt++) {
        shuffled = jsPsych.randomization.shuffle(points);
        const hasAdjacentRepeat = shuffled.some(
          (point, i) => i > 0 && point.x === shuffled[i - 1].x && point.y === shuffled[i - 1].y
        );
        if (!hasAdjacentRepeat) break;
      }
      return shuffled;
    }

    function buildCalibrationTimeline(targets, repetitions = 2, randomize = true) {
      let points = [];
      for (let r = 0; r < repetitions; r++) points = points.concat(targets);
      if (randomize) points = shuffleNoAdjacentRepeats(points);
      return points.map((t) => makeCalibrationPoint(t.x, t.y));
    }

    const calibration = {
      timeline: buildCalibrationTimeline(calibrationTargets, 2, true)
    };

    const validationInstructions = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <p>Now we'll measure the accuracy of the calibration.</p>
        <p>Look at each dot as it appears on the screen.</p>
        <p style="font-weight:bold;">You do not need to click on the dots this time.</p>
      ` + labFooter,
      choices: ['Got it'],
      post_trial_gap: 1000
    };

    const validation = {
      type: jsPsychWebgazerValidate,
      validation_points: [
        [25, 25], [75, 25], [50, 50], [25, 75], [75, 75]
      ],
      roi_radius: 200,
      time_to_saccade: 1000,
      validation_duration: 2000,
      data: { task: 'validate' }
    };

    const calibrationAndValidation = {
      timeline: [calibration, validationInstructions, validation],
      on_timeline_start: () => jsPsych.extensions.webgazer.resume(),
      on_timeline_finish: () => jsPsych.extensions.webgazer.pause()
    };

    const recalibrateInstructions = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <p>The accuracy of the calibration is a little lower than we'd like.</p>
        <p>Let's try calibrating one more time.</p>
      ` + labFooter,
      choices: ['OK']
    };

    const recalibrate = {
      timeline: [recalibrateInstructions, calibrationAndValidation],
      conditional_function: function () {
        const validationData = jsPsych.data.get().filter({ task: 'validate' }).values();
        const last = validationData[validationData.length - 1];
        return last.percent_in_roi.some((x) => x < 50);
      },
      on_timeline_start: () => jsPsych.extensions.webgazer.resetCalibration()
    };

    const calibrationDone = {
      type: jsPsychHtmlButtonResponse,
      stimulus: '<p>Great, we\'re done with calibration!</p>' + labFooter,
      choices: ['OK']
    };

    const instructions = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<p>After each video finishes, press the spacebar to continue. Press any key to start!</p>' + labFooter
    };

    const fixationDuration = 2000; // ms

    function makeFixationTrial(video) {
      let sparkle;
      const stopSparkle = () => {
        if (sparkle) {
          sparkle.pause();
          sparkle.currentTime = 0;
        }
      };
      return {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div style="text-align:center;">
            <img src="img/star.png" class="fixation-star">
          </div>
        `,
        choices: "NO_KEYS",
        trial_duration: fixationDuration,
        on_load: function () {
          sparkle = new Audio('snd/sparkle.mp3');
          sparkle.play().catch(() => {});
          setTimeout(stopSparkle, fixationDuration);
        },
        on_finish: stopSparkle,
        data: { task: 'fixation', video_file: video }
      };
    }

    const videoTrials = videoFiles.map((video) => ({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="text-align:center;">
          <video id="stim-video" autoplay preload="auto" playsinline width="800" style="max-width:100%;">
            <source src="${video}" type="video/mp4">
            Your browser does not support HTML video.
          </video>
        </div>
      `,
      prompt: '<p>Press the spacebar after the video finishes.</p>',
      choices: "NO_KEYS",
      on_load: function () {
        const start_time = performance.now();
        const videoEl = document.getElementById('stim-video');
        videoEl.addEventListener('ended', function onEnded() {
          videoEl.removeEventListener('ended', onEnded);
          jsPsych.pluginAPI.getKeyboardResponse({
            callback_function: (info) => {
              jsPsych.finishTrial({
                rt: Math.round(performance.now() - start_time),
                response: info.key
              });
            },
            valid_responses: [' '],
            rt_method: 'performance',
            persist: false,
            allow_held_key: false
          });
        });
      },
      extensions: [
        {
          type: jsPsychExtensionWebgazer,
          params: { targets: ['#stim-video'] }
        }
      ],
      data: { task: 'video', video_file: video }
    }));

    const videoBlock = {
      timeline: videoFiles.flatMap((video, i) => [
        makeFixationTrial(video),
        videoTrials[i]
      ]),
      on_timeline_start: () => jsPsych.extensions.webgazer.resume(),
      on_timeline_finish: () => jsPsych.extensions.webgazer.pause()
    };

    const dataPipeExperimentId = 'WEbgGWgBVtbp';

    const saveDataPipe = {
      type: jsPsychPipe,
      action: "save",
      experiment_id: dataPipeExperimentId,
      filename: () => `${jsPsych.randomization.randomID(10)}.csv`,
      data_string: () => jsPsych.data.get().csv()
    };

    const goodbye = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<p>Thank you. The experiment is complete.</p><p>Press any key to finish.</p>' + labFooter
    };

    const timeline = [
      preload,
      welcome,
      cameraInstructions,
      initCamera,
      calibrationInstructions,
      calibrationAndValidation,
      recalibrate,
      calibrationDone,
      instructions,
      videoBlock,
      saveDataPipe,
      goodbye
    ];

    jsPsych.run(timeline);
  </script>
</html>
